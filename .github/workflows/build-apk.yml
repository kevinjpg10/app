name: Build Android APK Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versión estable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        # Asegúrate de que tu package.json esté en /frontend
        working-directory: ./frontend 
        run: yarn install

      - name: Expo prebuild
        working-directory: ./frontend
        # Aquí es donde se crean los archivos de Android
        run: npx expo prebuild --platform android --no-install

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore efrain-release.keystore \
            -alias efrain-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass efrain1234 \
            -keypass efrain1234 \
            -dname "CN=Efrain Gastos, OU=App, O=Efrain, L=Madrid, S=Madrid, C=ES"

      - name: Copy keystore to android folder
        run: cp efrain-release.keystore frontend/android/app/efrain-release.keystore

      - name: Configure signing in gradle
        working-directory: ./frontend/android
        run: |
          # Este paso inyecta tu clave en el constructor de Android
          cat >> app/build.gradle << 'GRADLE'

          android {
            signingConfigs {
              release {
                storeFile file("efrain-release.keystore")
                storePassword "efrain1234"
                keyAlias "efrain-key"
                keyPassword "efrain1234"
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
              }
            }
          }
          GRADLE

      - name: Build Release APK
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: efrain-gastos-apk
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
